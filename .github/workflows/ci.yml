name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4', '8.5']

    env:
      APP_ENV: test
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data_test.db"

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ctype, iconv, pdo, sqlite
          coverage: none

      - name: Audit dependencies
        run: composer audit --locked

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Setup the environment file
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Run database migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test || true

      - name: Static analysis
        run: vendor/bin/phpstan analyze -c phpstan.neon

      - name: Run tests
        run: vendor/bin/phpunit --configuration phpunit.dist.xml
